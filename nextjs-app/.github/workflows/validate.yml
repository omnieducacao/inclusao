name: Omnisfera V5 Validator Pipeline

on:
  push:
    branches: [ "main", "v4-stable", "v5-alpha" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Instalação de Dependências
      run: npm install --legacy-peer-deps

    - name: Verificação de Tipagem (TypeScript)
      run: npx tsc --noEmit

    - name: Análise Estática (ESLint)
      run: npm run lint

    - name: Verificação de Build de Produção (Next.js)
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1
        # Mock env vars here if needed for building

    - name: Testes Unitários de Componentes (Vitest)
      run: npm run test:unit
      continue-on-error: true

    - name: Testes de End-to-End (Playwright)
      run: |
        npx playwright install --with-deps chromium
        npm run test:e2e
      continue-on-error: true
